<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>獵豹特色｜已整併至關於獵豹</title>
  <meta name="description" content="獵豹特色相關內容已整併到關於獵豹頁面。">
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('slug');
      var target = 'about.html';
      if (slug) target += '?slug=' + encodeURIComponent(slug);
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a id="redirect-link" href="about.html">about.html</a>...</p>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('slug');
      var target = 'about.html';
      if (slug) target += '?slug=' + encodeURIComponent(slug);
      document.getElementById('redirect-link').setAttribute('href', target);
    })();
  </script>
</body>
</html>
